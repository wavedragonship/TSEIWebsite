<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join TSE Investments LLC</title>
    <!-- Include the Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; }
        .signup-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .message { margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="signup-container">
    <h2>Create Member Account</h2>
    <form id="signup-form">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="member@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Choose a secure password">
        </div>
        <button type="submit">Register Member</button>
    </form>
    <div id="message-box" class="message"></div>
</div>

<script>
    // 1. Replace these with your actual Supabase credentials
    const SUPABASE_URL = "https://ukythwzqpiqrztnbpqtm.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVreXRod3pxcGlxcnp0bmJwcXRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDE1ODcsImV4cCI6MjA5NTA3NzU4N30.nan3Z8c7FxWzJEXB8I4G6PMQgN5dLAXWMe6FXvpcMqc";

    // 2. Initialize the Supabase Client
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 3. Handle the form submission
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageBox = document.getElementById('message-box');
        
        messageBox.innerText = "Registering...";
        messageBox.style.color = "black";

        // 4. Call Supabase Auth to create the user
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            messageBox.innerText = "Error: " + error.message;
            messageBox.style.color = "red";
        } else {
            messageBox.innerText = "Success! Please check your email for a confirmation link.";
            messageBox.style.color = "green";
            document.getElementById('signup-form').reset();
        }
    });
</script>

</body>
</html>
